services:
  - type: web
    name: medconnect-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: medconnect-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://swasthyalink-teal.vercel.app,http://localhost:3000,http://127.0.0.1:3000"
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1

databases:
  - name: medconnect-db
    databaseName: medconnect
    user: medconnect
    plan: free
